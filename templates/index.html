<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/api-create-user" method="post">
        <input type="text" name="user_first_name" placeholder="First Name" required>
        <input type="text" name="user_last_name" placeholder="Last Name" required>
        <input type="email" name="user_email" placeholder="Email" required>
        <input type="text" name="user_address" placeholder="Address" required>
        <input type="text" name="user_phone" placeholder="Phone" required>
        <input type="text" name="user_website" placeholder="Website">
        <input type="password" name="user_password" placeholder="Password" required>
        <input type="password" name="repeat_user_password" placeholder="Repeat Password" required>
        <button type="submit">Create User</button>
</body>
</html>
